---
# Example 3: Scale based on combined success requests (200 + 304)
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: testservice-success-scaler
  namespace: keda
spec:
  scaleTargetRef:
    name: scalingtest
  pollingInterval: 3
