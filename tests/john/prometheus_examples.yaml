# Example KEDA ScaledObject configurations with different Prometheus queries

---
# Example 1: Scale based on HTTP 200 requests
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: testservice-http200-scaler
  namespace: keda
spec:
  scaleTargetRef:
    name: scalingtest
  pollingInterval: 3
  cooldownPeriod: 3
  minReplicaCount: 1
  maxReplicaCount: 5
  triggers:
  - type: prometheus
    metadata:
      serverAddress: http://kube-prometheus-stack-prometheus.monitoring:9090
      query: sum(irate(testservice_http_requests_total{status="200"}[5m]))
      threshold: '2.0'
      activationThreshold: '1.0'

---
